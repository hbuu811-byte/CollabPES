{% extends "base.html" %}
{% from "_avatar_macros.html" import player_avatar %}
{% block content %}
<div class="room-view-shell">
    <div id="roomLiveContent" class="room-live-content" data-room-live-content>
        {% include "_room_live_content.html" %}
    </div>
</div>

<div id="roomExitConfirmModal" class="room-action-modal" hidden aria-hidden="true">
    <div class="room-action-modal-card" role="dialog" aria-modal="true" aria-labelledby="roomActionModalTitle" aria-describedby="roomActionModalMessage">
        <button class="room-action-modal-close" type="button" data-room-modal-cancel aria-label="Đóng">×</button>
        <div id="roomActionModalIcon" class="room-action-modal-icon" aria-hidden="true">⚠</div>
        <div class="room-action-modal-copy">
            <span class="room-action-modal-kicker">PES ARENA</span>
            <h2 id="roomActionModalTitle">Xác nhận thao tác</h2>
            <p id="roomActionModalMessage"></p>
        </div>
        <div id="roomActionModalNote" class="room-action-modal-note">−20 RP</div>
        <div class="room-action-modal-actions">
            <button id="roomActionModalCancel" class="room-action-modal-button secondary" type="button" data-room-modal-cancel>Ở lại phòng</button>
            <button id="roomActionModalConfirm" class="room-action-modal-button primary" type="button">Xác nhận</button>
        </div>
    </div>
</div>

<script>
function fallbackCopyRoomLink(value) {
    const textarea = document.createElement("textarea");
    textarea.value = value;
    textarea.setAttribute("readonly", "");
    textarea.style.position = "fixed";
    textarea.style.opacity = "0";
    document.body.appendChild(textarea);
    textarea.select();
    const copied = document.execCommand("copy");
    textarea.remove();
    return copied;
}

async function copySharedRoomLink() {
    const button = document.getElementById("copyRoomShareLink");
    const status = document.getElementById("roomShareStatus");
    if (!button) return;

    const shareUrl = new URL(button.dataset.sharePath, window.location.origin).toString();
    let copied = false;
    try {
        if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(shareUrl);
            copied = true;
        } else {
            copied = fallbackCopyRoomLink(shareUrl);
        }
    } catch (error) {
        copied = fallbackCopyRoomLink(shareUrl);
    }

    const strong = button.querySelector("strong");
    const small = button.querySelector("small");
    if (copied) {
        button.classList.add("is-copied");
        if (strong) strong.textContent = "Đã copy link";
        if (small) small.textContent = "Gửi link này cho đối thủ";
        if (status) status.textContent = "Đã sao chép link phòng đấu.";
        window.setTimeout(function () {
            button.classList.remove("is-copied");
            if (strong) strong.textContent = "Chia sẻ phòng";
            if (small) small.textContent = "Copy link tham gia";
            if (status) status.textContent = "";
        }, 3500);
    } else {
        if (status) status.textContent = "Không thể tự copy. Hãy sao chép link trên thanh địa chỉ.";
        window.prompt("Copy link phòng đấu:", shareUrl);
    }
}

document.addEventListener("click", function (event) {
    const shareButton = event.target.closest ? event.target.closest("#copyRoomShareLink") : null;
    if (!shareButton) return;
    event.preventDefault();
    copySharedRoomLink();
});

let currentRoomStateKey = {{ initial_room_state_key|tojson }};
let currentRoomStatus = {{ room.status|tojson }};
const currentRoomUserIsHost = {{ (current_user.id == room.host_user_id or current_user.role == 'admin')|tojson }};
const currentRoomUserIsGuest = {{ (current_user.id == room.guest_user_id)|tojson }};
const roomScoreDraftKey = "pes-room-score-draft:{{ room.id }}";
let roomScoreFormDirty = false;
let roomCountdownSeconds = 0;
let roomStartCountdownSeconds = 0;
let roomStartCountdownMode = "down";
let roomStatePoller = null;
let roomViewRefreshInFlight = false;
let roomStateStablePolls = 0;

function renderRoomCountdown(seconds) {
    const countdown = document.getElementById("roomCountdown");
    if (!countdown) return;
    const safeSeconds = Math.max(0, Number(seconds) || 0);
    const minutes = Math.floor(safeSeconds / 60);
    const remain = Math.floor(safeSeconds % 60);
    countdown.textContent = String(minutes).padStart(2, "0") + ":" + String(remain).padStart(2, "0");
}

function renderRoomStartCountdown(seconds) {
    const countdown = document.getElementById("roomStartCountdown");
    if (!countdown) return;
    const safeSeconds = Math.max(0, Number(seconds) || 0);
    const minutes = Math.floor(safeSeconds / 60);
    const remain = Math.floor(safeSeconds % 60);
    countdown.textContent = String(minutes).padStart(2, "0") + ":" + String(remain).padStart(2, "0");
}

function syncRoomCountdownsFromDom() {
    const roomCountdown = document.getElementById("roomCountdown");
    const startCountdown = document.getElementById("roomStartCountdown");
    roomCountdownSeconds = Number(roomCountdown?.dataset.seconds || 0);
    roomStartCountdownSeconds = Number(startCountdown?.dataset.seconds || 0);
    roomStartCountdownMode = startCountdown?.dataset.mode || "down";
    renderRoomCountdown(roomCountdownSeconds);
    renderRoomStartCountdown(roomStartCountdownSeconds);
}

window.setInterval(function () {
    if (roomCountdownSeconds > 0) roomCountdownSeconds -= 1;
    if (roomStartCountdownMode === "up") {
        roomStartCountdownSeconds += 1;
    } else if (roomStartCountdownSeconds > 0) {
        roomStartCountdownSeconds -= 1;
    }
    renderRoomCountdown(roomCountdownSeconds);
    renderRoomStartCountdown(roomStartCountdownSeconds);
}, 1000);

function getRoomScoreInputs() {
    const form = document.querySelector(".room-score-form");
    return form ? Array.from(form.querySelectorAll('input[name="host_score"], input[name="guest_score"]')) : [];
}

function saveRoomScoreDraft() {
    const inputs = getRoomScoreInputs();
    if (!inputs.length) return;
    roomScoreFormDirty = true;
    try {
        const draft = {};
        inputs.forEach(function (input) { draft[input.name] = input.value; });
        sessionStorage.setItem(roomScoreDraftKey, JSON.stringify(draft));
    } catch (error) {}
}

function restoreRoomScoreDraft() {
    const inputs = getRoomScoreInputs();
    if (!inputs.length) return;
    try {
        const raw = sessionStorage.getItem(roomScoreDraftKey);
        if (!raw) return;
        const draft = JSON.parse(raw);
        inputs.forEach(function (input) {
            if (Object.prototype.hasOwnProperty.call(draft, input.name)) input.value = draft[input.name];
        });
        roomScoreFormDirty = true;
    } catch (error) {}
}

function bindRoomScoreDraft() {
    const form = document.querySelector(".room-score-form");
    const inputs = getRoomScoreInputs();
    inputs.forEach(function (input) {
        if (input.dataset.roomDraftBound === "1") return;
        input.dataset.roomDraftBound = "1";
        input.addEventListener("input", saveRoomScoreDraft);
    });
    if (form && form.dataset.roomDraftBound !== "1") {
        form.dataset.roomDraftBound = "1";
        form.addEventListener("submit", function () {
            roomScoreFormDirty = false;
            try { sessionStorage.removeItem(roomScoreDraftKey); } catch (error) {}
        });
    }
    restoreRoomScoreDraft();
}

function fieldPreserveKey(field, index) {
    return field.id || field.name || (field.tagName + ":" + index);
}

function captureRoomFormState() {
    const root = document.getElementById("roomLiveContent");
    if (!root) return {fields: {}, activeKey: "", selectionStart: null, selectionEnd: null};
    const fields = {};
    const elements = Array.from(root.querySelectorAll("input, textarea, select"));
    elements.forEach(function (field, index) {
        if (field.type === "file" || field.type === "submit" || field.type === "button") return;
        const key = fieldPreserveKey(field, index);
        fields[key] = {
            value: field.value,
            checked: Boolean(field.checked),
            type: field.type || field.tagName
        };
    });
    const active = root.contains(document.activeElement) ? document.activeElement : null;
    return {
        fields: fields,
        activeKey: active ? fieldPreserveKey(active, elements.indexOf(active)) : "",
        selectionStart: active && typeof active.selectionStart === "number" ? active.selectionStart : null,
        selectionEnd: active && typeof active.selectionEnd === "number" ? active.selectionEnd : null
    };
}

function restoreRoomFormState(snapshot) {
    if (!snapshot || !snapshot.fields) return;
    const root = document.getElementById("roomLiveContent");
    if (!root) return;
    const elements = Array.from(root.querySelectorAll("input, textarea, select"));
    let focusTarget = null;
    elements.forEach(function (field, index) {
        if (field.type === "file" || field.type === "submit" || field.type === "button") return;
        const key = fieldPreserveKey(field, index);
        const saved = snapshot.fields[key];
        if (!saved) return;
        if (field.type === "checkbox" || field.type === "radio") field.checked = saved.checked;
        else field.value = saved.value;
        if (snapshot.activeKey === key) focusTarget = field;
    });
    if (focusTarget) {
        focusTarget.focus({preventScroll: true});
        if (snapshot.selectionStart !== null && typeof focusTarget.setSelectionRange === "function") {
            try { focusTarget.setSelectionRange(snapshot.selectionStart, snapshot.selectionEnd); } catch (error) {}
        }
    }
}

function bindRoomLiveControls() {
    bindRoomScoreDraft();
    syncRoomCountdownsFromDom();
    if (typeof window.PESInitWinStreakEvent === "function") window.PESInitWinStreakEvent();
}

function getRoomStateInterval() {
    let baseInterval = 10000;
    if (currentRoomStatus === "waiting_result_confirm") {
        baseInterval = currentRoomUserIsGuest ? 2200 : 4500;
    } else if (currentRoomStatus === "playing") {
        baseInterval = currentRoomUserIsGuest ? 4000 : 7500;
    } else if (currentRoomStatus === "friendly_playing") {
        baseInterval = 10000;
    } else if (currentRoomStatus === "waiting_ready") {
        baseInterval = currentRoomUserIsGuest ? 4000 : 5000;
    } else if (currentRoomStatus === "confirmed") {
        baseInterval = 7000;
    }

    // Sau nhiều lần không đổi, tự giãn để giảm request. Khi có thay đổi,
    // roomStateStablePolls được đặt lại 0 và tốc độ phản hồi nhanh trở lại.
    if (roomStateStablePolls >= 8) return Math.min(18000, Math.round(baseInterval * 2.4));
    if (roomStateStablePolls >= 4) return Math.min(13000, Math.round(baseInterval * 1.6));
    return baseInterval;
}

function stopRoomStatePolling() {
    if (roomStatePoller) roomStatePoller.stop("room-state-stop");
    roomStatePoller = null;
}

function stopRoomChatPolling() {
    if (window.PESRoomChatPoller && typeof window.PESRoomChatPoller.stop === "function") {
        window.PESRoomChatPoller.stop("room-chat-stop");
    }
    window.PESRoomChatPoller = null;
}

function stopRoomInteractionPolling(reason) {
    const stopReason = reason || "room-action-submit";
    stopRoomStatePolling();
    stopRoomChatPolling();
    if (window.PESNet && typeof PESNet.stopByPrefix === "function") {
        PESNet.stopByPrefix("room-state:", stopReason);
        PESNet.stopByPrefix("room-chat:", stopReason);
    }
    if (window.PESNet && typeof PESNet.abortRequestsByPrefix === "function") {
        PESNet.abortRequestsByPrefix("request:room-state:", stopReason);
        PESNet.abortRequestsByPrefix("request:room-chat:", stopReason);
    }
}

function stopAllRoomPolling(reason) {
    const stopReason = reason || "leave-room-page";
    stopRoomInteractionPolling(stopReason);
    if (window.PESNet && typeof PESNet.stopAll === "function") {
        PESNet.stopAll(stopReason);
    } else if (window.PESNet && typeof PESNet.abortAllRequests === "function") {
        PESNet.abortAllRequests(stopReason);
    }
}

window.PESStopRoomPolling = stopAllRoomPolling;
window.PESStopRoomInteractionPolling = stopRoomInteractionPolling;

function showRoomRedirectNotice(options) {
    stopAllRoomPolling();
    if (window.PESRoomActionModal && typeof window.PESRoomActionModal.showNotice === "function") {
        window.PESRoomActionModal.showNotice(options);
    } else if (options.redirectUrl) {
        window.location.href = options.redirectUrl;
    }
}

function refreshRoomLiveContent(nextStateKey, signal) {
    if (roomViewRefreshInFlight) return Promise.resolve(false);
    const target = document.getElementById("roomLiveContent");
    if (!target) return Promise.resolve(false);

    roomViewRefreshInFlight = true;
    const preserved = captureRoomFormState();
    return fetch("{{ url_for('api_room_view', room_id=room.id) }}", {
        method: "GET",
        credentials: "same-origin",
        cache: "no-store",
        headers: {"X-Requested-With": "XMLHttpRequest"},
        signal: signal
    })
    .then(function (response) {
        if (response.status === 401 || response.status === 403 || response.status === 404) {
            stopAllRoomPolling();
            window.location.href = "{{ url_for('dashboard') }}";
            return "";
        }
        if (!response.ok) throw new Error("room_view_" + response.status);
        return response.text();
    })
    .then(function (html) {
        if (!html) return false;
        target.innerHTML = html;
        restoreRoomFormState(preserved);
        bindRoomLiveControls();
        if (typeof currentRoomChatKey !== "undefined") currentRoomChatKey = "";
        if (window.PESRoomChatPoller && typeof window.PESRoomChatPoller.runNow === "function") {
            window.PESRoomChatPoller.runNow();
        }
        currentRoomStateKey = nextStateKey || currentRoomStateKey;
        return true;
    })
    .finally(function () {
        roomViewRefreshInFlight = false;
    });
}

function checkRoomState(signal) {
    const stateUrl = new URL("{{ url_for('api_room_state', room_id=room.id) }}", window.location.origin);
    if (currentRoomStateKey) stateUrl.searchParams.set("since", currentRoomStateKey);

    const requestOptions = {
        method: "GET",
        credentials: "same-origin",
        cache: "no-store",
        headers: {"X-Requested-With": "XMLHttpRequest"},
        signal: signal
    };
    const stateRequest = window.PESNet && typeof PESNet.fetchJsonOnce === "function"
        ? PESNet.fetchJsonOnce("request:room-state:{{ room.id }}", stateUrl.toString(), requestOptions, 12000)
        : fetch(stateUrl.toString(), requestOptions).then(function (res) {
            if (res.status === 204 || res.status === 304) {
                return {ok: res.ok, status: res.status, data: null};
            }
            return res.json().then(function (data) {
                return {ok: res.ok, status: res.status, data: data};
            });
        });

    return stateRequest
    .then(function (result) {
        if (!result) return null;
        if (result.status === 204 || result.status === 304) {
            roomStateStablePolls = Math.min(20, roomStateStablePolls + 1);
            return null;
        }
        if (result.status === 401 || result.status === 403 || result.status === 404) {
            stopAllRoomPolling();
            window.location.href = "{{ url_for('dashboard') }}";
            return null;
        }
        if (!result.ok) throw new Error("room_state_" + result.status);
        return result.data;
    })
    .then(function (data) {
        if (!data || !data.ok) return;
        currentRoomStatus = data.status || currentRoomStatus;

        if (data.status === "cancelled") {
            stopAllRoomPolling();
            window.location.href = "{{ url_for('dashboard') }}";
            return;
        }
        if (data.rematch_expired) {
            showRoomRedirectNotice({
                tone: "warning",
                icon: "⌛",
                title: "Yêu cầu đá tiếp đã hết hạn",
                message: "Yêu cầu đá tiếp đã hết hạn sau 60 giây. Bạn sẽ được đưa về sảnh chính.",
                note: "VỀ SẢNH CHÍNH",
                confirmLabel: "Về sảnh chính",
                redirectUrl: "{{ url_for('dashboard') }}",
                autoRedirectMs: 4500
            });
            return;
        }
        if (typeof data.timeout_seconds !== "undefined") {
            roomCountdownSeconds = Number(data.timeout_seconds) || 0;
            renderRoomCountdown(roomCountdownSeconds);
        }
        if (data.rematch_declined) {
            stopAllRoomPolling();
            if (!data.rematch_declined_by_me) {
                showRoomRedirectNotice({
                    tone: "warning",
                    icon: "🚪",
                    title: "Đối thủ đã rời phòng",
                    message: "Đối thủ không muốn đá tiếp. Bạn sẽ được đưa về sảnh chính.",
                    note: "PHIÊN ĐẤU ĐÃ KẾT THÚC",
                    confirmLabel: "Về sảnh chính",
                    redirectUrl: "{{ url_for('dashboard') }}",
                    autoRedirectMs: 5000
                });
            } else {
                window.location.href = "{{ url_for('dashboard') }}";
            }
            return;
        }
        if (data.state_key && data.state_key !== currentRoomStateKey) {
            roomStateStablePolls = 0;
            return refreshRoomLiveContent(data.state_key, signal);
        }
    })
    .catch(function (error) {
        if (error && error.name === "AbortError") return;
        throw error;
    });
}

window.addEventListener("DOMContentLoaded", function () {
    bindRoomLiveControls();
    const liveContent = document.getElementById("roomLiveContent");
    if (liveContent) {
        liveContent.addEventListener("pointerdown", function () {
            roomStateStablePolls = 0;
        }, {passive: true});
    }
    if (!window.PESNet) return;

    if (typeof PESNet.stopByPrefix === "function") {
        PESNet.stopByPrefix("room-state:", "replace-room-state");
    }
    roomStatePoller = PESNet.createPoller({
        key: "room-state:{{ room.id }}",
        task: checkRoomState,
        interval: getRoomStateInterval,
        hiddenInterval: 60000,
        runWhenHidden: false,
        immediate: true,
        jitter: 250,
        timeoutMs: 12000
    });
});

window.addEventListener("pagehide", function () {
    stopAllRoomPolling("room-pagehide");
}, {once: true});
</script>

{% if system_features.room_chat_enabled %}
<script>
let currentRoomChatKey = "";

function escapeRoomHtml(text) {
    const div = document.createElement("div");
    div.innerText = text || "";
    return div.innerHTML;
}

function renderRoomAvatar(url, name, achievement) {
    const safeName = escapeRoomHtml(name || "?");
    const initial = escapeRoomHtml((name || "?").trim().charAt(0).toUpperCase() || "?");
    const badge = achievement && achievement.icon
        ? `<span class="avatar-achievement" title="${escapeRoomHtml(achievement.name || 'Huy hiệu')}">${escapeRoomHtml(achievement.icon)}</span>`
        : "";
    if (url) return `<span class="player-avatar avatar-xs"><img src="${escapeRoomHtml(url)}" alt="Ảnh đại diện ${safeName}" loading="lazy">${badge}</span>`;
    return `<span class="player-avatar avatar-xs"><span>${initial}</span>${badge}</span>`;
}

function renderRoomChat(messages) {
    const box = document.getElementById("roomChatBox");
    if (!box) return;

    const nextKey = (messages || []).map(function (msg) {
        return [msg.id || "", msg.created_at || "", msg.message || ""].join(":");
    }).join("|");
    if (nextKey === currentRoomChatKey) return;
    currentRoomChatKey = nextKey;

    box.innerHTML = messages.map(function (msg) {
        const adminBadge = msg.user_role === "admin" ? '<span class="badge gold">ADMIN</span>' : '';
        const adminClass = msg.user_role === "admin" ? 'admin' : '';
        return `
            <div class="chat-message">
                <div class="chat-message-head">${renderRoomAvatar(msg.user_avatar_url, msg.user_name, msg.user_achievement)}<span class="chat-name ${adminClass}">${escapeRoomHtml(msg.user_name)}</span></div>
                ${adminBadge}
                <span class="chat-time">${escapeRoomHtml(msg.created_at_display || msg.created_at)}</span>
                <div class="chat-text">${escapeRoomHtml(msg.message)}</div>
            </div>
        `;
    }).join("");

    box.scrollTop = box.scrollHeight;
}

function loadRoomChat(signal) {
    if (document.hidden) return Promise.resolve();

    const url = "{{ url_for('api_room_chat', room_id=room.id) }}";
    const options = {
        credentials: "same-origin",
        cache: "no-store",
        signal: signal
    };
    const request = window.PESNet && typeof PESNet.fetchJsonOnce === "function"
        ? PESNet.fetchJsonOnce("request:room-chat:{{ room.id }}", url, options, 12000)
        : fetch(url, options).then(function (res) {
            return res.json().then(function (data) {
                return {ok: res.ok, status: res.status, data: data};
            });
        });

    return request
        .then(function (result) {
            if (!result) return;
            const data = result.data || {};

            if (data.disabled || data.closed || result.status === 404) {
                stopRoomChatPolling();
                return;
            }
            if (result.status === 401 || result.status === 403) {
                stopRoomChatPolling();
                return;
            }
            if (!result.ok) throw new Error("room_chat_" + result.status);
            if (data.ok) renderRoomChat(data.messages || []);
        })
        .catch(function (error) {
            if (!error || error.name !== "AbortError") return;
        });
}

window.addEventListener("DOMContentLoaded", function () {
    if (!window.PESNet) return loadRoomChat();

    if (typeof PESNet.stopByPrefix === "function") {
        PESNet.stopByPrefix("room-chat:", "replace-room-chat");
    }
    window.PESRoomChatPoller = PESNet.createPoller({
        key: "room-chat:{{ room.id }}",
        task: loadRoomChat,
        interval: function () {
            const chatBox = document.getElementById("roomChatBox");
            if (!chatBox) return 60000;
            const rect = chatBox.getBoundingClientRect();
            const visible = rect.bottom > 0 && rect.top < window.innerHeight;
            return visible ? 30000 : 60000;
        },
        hiddenInterval: 120000,
        runWhenHidden: false,
        immediate: true,
        jitter: 1000,
        timeoutMs: 12000
    });
});
</script>
{% endif %}

<script>
document.addEventListener("submit", function (event) {
    const form = event.target;
    if (!form || form.classList.contains("room-exit-confirm-form")) return;

    let actionPath = "";
    try {
        actionPath = new URL(form.action || window.location.href, window.location.origin).pathname;
    } catch (error) {}

    if (actionPath.indexOf("/room/{{ room.id }}/") === 0) {
        stopRoomInteractionPolling("room-action-submit");
    }
}, true);
</script>

<script>
function initWinStreakEvent(){
    const announcement = document.getElementById("winStreakAnnouncement");
    const toast = document.getElementById("winStreakToast");
    const source = announcement || toast;
    if (!source) return;

    const eventId = source.dataset.eventId || "unknown";
    const storageKey = "pes2026-win-streak-event:" + eventId;

    if (localStorage.getItem(storageKey)) {
        if (announcement) announcement.remove();
        if (toast) toast.remove();
        return;
    }

    localStorage.setItem(storageKey, String(Date.now()));

    if (announcement) {
        const duration = Number(announcement.dataset.duration || 4000);
        requestAnimationFrame(() => announcement.classList.add("is-visible"));
        setTimeout(() => {
            announcement.classList.add("is-leaving");
            setTimeout(() => announcement.remove(), 700);
        }, Math.max(1000, duration - 700));
    }

    if (toast) {
        const duration = Number(toast.dataset.duration || 6000);
        requestAnimationFrame(() => toast.classList.add("is-visible"));
        setTimeout(() => {
            toast.classList.add("is-leaving");
            setTimeout(() => toast.remove(), 500);
        }, Math.max(1500, duration - 500));
    }
}
window.PESInitWinStreakEvent = initWinStreakEvent;
initWinStreakEvent();
</script>


<script>
(function initRoomExitConfirmModal() {
    const modal = document.getElementById("roomExitConfirmModal");
    if (!modal) return;

    const title = document.getElementById("roomActionModalTitle");
    const message = document.getElementById("roomActionModalMessage");
    const note = document.getElementById("roomActionModalNote");
    const icon = document.getElementById("roomActionModalIcon");
    const confirmButton = document.getElementById("roomActionModalConfirm");
    const cancelButton = document.getElementById("roomActionModalCancel");
    const closeButton = modal.querySelector(".room-action-modal-close");
    const cancelButtons = modal.querySelectorAll("[data-room-modal-cancel]");

    let pendingForm = null;
    let returnFocus = null;
    let submitting = false;
    let noticeMode = false;
    let noticeRedirectUrl = "";
    let noticeTimer = null;

    function clearNoticeTimer() {
        if (noticeTimer) {
            window.clearTimeout(noticeTimer);
            noticeTimer = null;
        }
    }

    function setDismissControlsVisible(visible) {
        if (cancelButton) cancelButton.hidden = !visible;
        if (closeButton) closeButton.hidden = !visible;
    }

    function revealModal() {
        modal.hidden = false;
        modal.setAttribute("aria-hidden", "false");
        document.body.classList.add("room-action-modal-open");
        window.requestAnimationFrame(function () {
            modal.classList.add("is-open");
            confirmButton.focus();
        });
    }

    function redirectNotice() {
        if (!noticeRedirectUrl) return;
        const target = noticeRedirectUrl;
        noticeRedirectUrl = "";
        clearNoticeTimer();
        confirmButton.disabled = true;
        confirmButton.textContent = "Đang chuyển về sảnh...";
        window.location.href = target;
    }

    function closeModal() {
        if (submitting || noticeMode) return;
        clearNoticeTimer();
        modal.classList.remove("is-open");
        modal.setAttribute("aria-hidden", "true");
        window.setTimeout(function () {
            modal.hidden = true;
        }, 180);
        document.body.classList.remove("room-action-modal-open");
        pendingForm = null;
        if (returnFocus && typeof returnFocus.focus === "function") returnFocus.focus();
    }

    function openModal(form) {
        clearNoticeTimer();
        noticeMode = false;
        noticeRedirectUrl = "";
        pendingForm = form;
        returnFocus = document.activeElement;
        setDismissControlsVisible(true);

        const tone = form.dataset.modalTone || "warning";
        modal.dataset.tone = tone;
        icon.textContent = form.dataset.modalIcon || "⚠";
        title.textContent = form.dataset.modalTitle || "Xác nhận thao tác";
        message.textContent = form.dataset.modalMessage || "Bạn có chắc chắn muốn tiếp tục?";
        note.textContent = form.dataset.modalNote || "";
        note.hidden = !form.dataset.modalNote;
        confirmButton.textContent = form.dataset.modalConfirmLabel || "Xác nhận";
        confirmButton.disabled = false;
        submitting = false;
        revealModal();
    }

    function showNotice(options) {
        const settings = options || {};
        clearNoticeTimer();
        pendingForm = null;
        returnFocus = null;
        submitting = false;
        noticeMode = true;
        noticeRedirectUrl = settings.redirectUrl || "";
        setDismissControlsVisible(false);

        modal.dataset.tone = settings.tone || "warning";
        icon.textContent = settings.icon || "ℹ";
        title.textContent = settings.title || "Thông báo phòng đấu";
        message.textContent = settings.message || "";
        note.textContent = settings.note || "";
        note.hidden = !settings.note;
        confirmButton.textContent = settings.confirmLabel || "Tiếp tục";
        confirmButton.disabled = false;
        revealModal();

        const autoRedirectMs = Number(settings.autoRedirectMs || 0);
        if (noticeRedirectUrl && autoRedirectMs > 0) {
            noticeTimer = window.setTimeout(redirectNotice, Math.max(1500, autoRedirectMs));
        }
    }

    document.addEventListener("submit", function (event) {
        const form = event.target && event.target.closest ? event.target.closest(".room-exit-confirm-form") : null;
        if (!form) return;
        event.preventDefault();
        if (submitting || noticeMode) return;
        openModal(form);
    });

    cancelButtons.forEach(function (button) {
        button.addEventListener("click", closeModal);
    });

    modal.addEventListener("click", function (event) {
        if (event.target === modal) closeModal();
    });

    document.addEventListener("keydown", function (event) {
        if (!modal.classList.contains("is-open") || noticeMode) return;
        if (event.key === "Escape") {
            event.preventDefault();
            closeModal();
        }
    });

    confirmButton.addEventListener("click", function () {
        if (noticeMode) {
            redirectNotice();
            return;
        }
        if (!pendingForm || submitting) return;
        submitting = true;
        confirmButton.disabled = true;
        confirmButton.textContent = "Đang xử lý...";
        const formToSubmit = pendingForm;
        stopAllRoomPolling("confirmed-room-exit");
        window.setTimeout(function () {
            HTMLFormElement.prototype.submit.call(formToSubmit);
        }, 120);
    });

    window.PESRoomActionModal = {
        showNotice: showNotice
    };
})();
</script>

{% endblock %}
