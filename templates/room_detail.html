{% extends "base.html" %}
{% block content %}
{% include "partials/room_dynamic_state.html" %}
<script>
var currentRoomStateKey = document.getElementById("roomDynamicState")?.dataset.stateKey || "";

function renderRoomCountdown(seconds) {
    const countdown = document.getElementById("roomCountdown");
    if (!countdown) return;
    const safeSeconds = Math.max(0, Number(seconds) || 0);
    const minutes = Math.floor(safeSeconds / 60);
    const remain = Math.floor(safeSeconds % 60);
    countdown.textContent = String(minutes).padStart(2, "0") + ":" + String(remain).padStart(2, "0");
}

var roomCountdownSeconds = Number(document.getElementById("roomCountdown")?.dataset.seconds || 0);
var roomStartCountdownElement = document.getElementById("roomStartCountdown");
var roomStartCountdownSeconds = Number(roomStartCountdownElement?.dataset.seconds || 0);
var roomStartCountdownMode = roomStartCountdownElement?.dataset.mode || "down";

function renderRoomStartCountdown(seconds) {
    const countdown = document.getElementById("roomStartCountdown");
    if (!countdown) return;
    const safeSeconds = Math.max(0, Number(seconds) || 0);
    const minutes = Math.floor(safeSeconds / 60);
    const remain = Math.floor(safeSeconds % 60);
    countdown.textContent = String(minutes).padStart(2, "0") + ":" + String(remain).padStart(2, "0");
}
renderRoomCountdown(roomCountdownSeconds);
renderRoomStartCountdown(roomStartCountdownSeconds);
setInterval(function () {
    if (document.hidden) return;
    if (roomCountdownSeconds > 0) roomCountdownSeconds -= 1;
    if (roomStartCountdownMode === "up") {
        roomStartCountdownSeconds += 1;
    } else if (roomStartCountdownSeconds > 0) {
        roomStartCountdownSeconds -= 1;
    }
    renderRoomCountdown(roomCountdownSeconds);
    renderRoomStartCountdown(roomStartCountdownSeconds);
}, 1000);

function roomHasActiveInput() {
    const active = document.activeElement;
    if (!active) return false;
    return active.tagName === "INPUT" || active.tagName === "TEXTAREA" || active.tagName === "SELECT";
}

function resetRoomDynamicRuntime() {
    const dynamicState = document.getElementById("roomDynamicState");
    currentRoomStateKey = dynamicState?.dataset.stateKey || currentRoomStateKey;
    roomCountdownSeconds = Number(document.getElementById("roomCountdown")?.dataset.seconds || 0);
    roomStartCountdownElement = document.getElementById("roomStartCountdown");
    roomStartCountdownSeconds = Number(roomStartCountdownElement?.dataset.seconds || 0);
    roomStartCountdownMode = roomStartCountdownElement?.dataset.mode || "down";
    renderRoomCountdown(roomCountdownSeconds);
    renderRoomStartCountdown(roomStartCountdownSeconds);
}

let roomFragmentRequestRunning = false;
function refreshRoomDynamicState() {
    if (roomFragmentRequestRunning || roomHasActiveInput() || !window.htmx) return Promise.resolve();
    roomFragmentRequestRunning = true;
    return Promise.resolve(window.htmx.ajax("GET", "{{ url_for('room_state_fragment', room_id=room.id) }}", {
        target: "#roomDynamicState",
        swap: "outerHTML"
    })).finally(function () {
        roomFragmentRequestRunning = false;
        resetRoomDynamicRuntime();
    });
}

document.body.addEventListener("htmx:afterSwap", function (event) {
    if (event.detail && event.detail.target && event.detail.target.id === "roomDynamicState") {
        resetRoomDynamicRuntime();
    }
});

let roomStateRequestRunning = false;
function checkRoomState() {
    if (!pollingEnabled || roomStateRequestRunning) return Promise.resolve();
    roomStateRequestRunning = true;
    return fetch("{{ url_for('api_room_state', room_id=room.id) }}", {
        method: "GET",
        credentials: "same-origin"
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
        if (!data.ok) return;
        if (data.status === "cancelled") {
            window.location.href = "{{ url_for('dashboard') }}";
            return;
        }
        if (data.rematch_expired) {
            window.alert("Yêu cầu đá tiếp đã hết hạn sau 60 giây. Bạn sẽ được đưa về sảnh chính.");
            window.location.href = "{{ url_for('dashboard') }}";
            return;
        }
        if (typeof data.timeout_seconds !== "undefined") {
            roomCountdownSeconds = Number(data.timeout_seconds) || 0;
            renderRoomCountdown(roomCountdownSeconds);
        }
        if (data.rematch_declined) {
            if (!data.rematch_declined_by_me) {
                window.alert("Đối thủ không muốn đá tiếp. Bạn sẽ được đưa về sảnh chính.");
            }
            window.location.href = "{{ url_for('dashboard') }}";
            return;
        }
        if (data.state_key !== currentRoomStateKey && !roomHasActiveInput()) {
            return refreshRoomDynamicState();
        }
    })
    .catch(function () {})
    .finally(function () { roomStateRequestRunning = false; });
}

window.RZ_ROOM_CHAT_ENABLED = {{ "true" if room_chat_enabled else "false" }};
window.RZ_ROOM_RUNTIME = window.RZ_ROOM_RUNTIME || { stateRealtime: false, chatRealtime: false };
function scheduleRoomStatePoll() {
    const delay = pollingEnabled ? (window.RZ_ROOM_RUNTIME.stateRealtime ? 90000 : 3000) : 30000;
    setTimeout(function () {
        Promise.resolve(checkRoomState()).finally(scheduleRoomStatePoll);
    }, delay);
}
checkRoomState();
scheduleRoomStatePoll();

function subscribeCurrentRoomRealtime() {
    if (!window.RZ_REALTIME?.enabled) return;
    let attempts = 0;
    const attach = function () {
        attempts += 1;
        if (!window.RZ_SUPABASE) {
            if (attempts < 40) setTimeout(attach, 250);
            return;
        }
        window.RZ_SUPABASE.channel("rz-room-{{ room.id }}")
            .on("postgres_changes", {
                event: "*",
                schema: "public",
                table: "match_rooms",
                filter: "id=eq.{{ room.id }}"
            }, function () {
                if (pollingEnabled) {
                    clearTimeout(window.RZ_ROOM_RUNTIME.stateEventTimer);
                    window.RZ_ROOM_RUNTIME.stateEventTimer = setTimeout(refreshRoomDynamicState, 80);
                }
            })
            .subscribe(function (status) {
                window.RZ_ROOM_RUNTIME.stateRealtime = status === "SUBSCRIBED";
            });

        // Chat phòng nhận sự kiện trực tiếp; polling chỉ còn là fallback.
        if (window.RZ_ROOM_CHAT_ENABLED) window.RZ_SUPABASE.channel("rz-room-chat-{{ room.id }}")
            .on("postgres_changes", {
                event: "INSERT",
                schema: "public",
                table: "chat_messages",
                filter: "room_id=eq.{{ room.id }}"
            }, function () {
                if (pollingEnabled) {
                    clearTimeout(window.RZ_ROOM_RUNTIME.chatEventTimer);
                    window.RZ_ROOM_RUNTIME.chatEventTimer = setTimeout(loadRoomChat, 80);
                }
            })
            .subscribe(function (status) {
                window.RZ_ROOM_RUNTIME.chatRealtime = status === "SUBSCRIBED";
            });
    };
    attach();
}
if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", subscribeCurrentRoomRealtime, { once: true });
} else {
    subscribeCurrentRoomRealtime();
}
</script>

<script>
function escapeRoomHtml(text) {
    const div = document.createElement("div");
    div.innerText = text || "";
    return div.innerHTML;
}

function renderRoomAvatar(url, name, achievement) {
    const safeName = escapeRoomHtml(name || "?");
    const initial = escapeRoomHtml((name || "?").trim().charAt(0).toUpperCase() || "?");
    const badge = achievement && achievement.icon
        ? `<span class="avatar-achievement" title="${escapeRoomHtml(achievement.name || 'Huy hiệu')}">${escapeRoomHtml(achievement.icon)}</span>`
        : "";
    if (url) return `<span class="player-avatar avatar-xs"><img src="${escapeRoomHtml(url)}" alt="Ảnh đại diện ${safeName}" loading="lazy">${badge}</span>`;
    return `<span class="player-avatar avatar-xs"><span>${initial}</span>${badge}</span>`;
}

let roomChatRenderKey = "";
function renderRoomChat(messages) {
    const box = document.getElementById("roomChatBox");
    if (!box) return;
    const renderKey = (messages || []).map(function (msg) {
        return [msg.id, msg.created_at, msg.message].join(":");
    }).join("|");
    if (renderKey === roomChatRenderKey) return;
    roomChatRenderKey = renderKey;

    box.innerHTML = messages.map(function (msg) {
        const adminBadge = msg.user_role === "admin" ? '<span class="badge gold">ADMIN</span>' : '';
        const adminClass = msg.user_role === "admin" ? 'admin' : '';
        return `
            <div class="chat-message">
                <div class="chat-message-head">${renderRoomAvatar(msg.user_avatar_url, msg.user_name, msg.user_achievement)}<span class="chat-name ${adminClass}">${escapeRoomHtml(msg.user_name)}</span></div>
                ${adminBadge}
                <span class="chat-time">${escapeRoomHtml(msg.created_at_display || msg.created_at)}</span>
                <div class="chat-text">${escapeRoomHtml(msg.message)}</div>
            </div>
        `;
    }).join("");

    box.scrollTop = box.scrollHeight;
}

let roomChatRequestRunning = false;
function loadRoomChat() {
    if (!window.RZ_ROOM_CHAT_ENABLED || !pollingEnabled || roomChatRequestRunning) return Promise.resolve();
    roomChatRequestRunning = true;
    return fetch("{{ url_for('api_room_chat', room_id=room.id) }}", { credentials: "same-origin" })
        .then(function (res) { return res.json(); })
        .then(function (data) {
            if (data.ok) renderRoomChat(data.messages);
        })
        .catch(function () {})
    .finally(function () { roomChatRequestRunning = false; });
}

function scheduleRoomChatPoll() {
    const delay = pollingEnabled ? (window.RZ_ROOM_RUNTIME.chatRealtime ? 45000 : 8000) : 30000;
    setTimeout(function () {
        Promise.resolve(loadRoomChat()).finally(scheduleRoomChatPoll);
    }, delay);
}
if (window.RZ_ROOM_CHAT_ENABLED) {
    loadRoomChat();
    scheduleRoomChatPoll();
}

document.addEventListener("visibilitychange", function () {
    if (!pollingEnabled) return;
    checkRoomState();
    if (window.RZ_ROOM_CHAT_ENABLED) loadRoomChat();
});
</script>
{% endblock %}
